<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="app-header">
    <h1>🏆 TOURNAMENT MANAGER 🏆</h1>
    <p>Create Your Own League</p>
</header>

<main class="container">

    <!-- ✅ CREATE TEAMS -->
    <section class="group-section card">
        <h2 class="group-title">Create Tournament</h2>

        <div id="teamInputs"></div>

        <button id="addTeamBtn" class="btn-submit">+ Add Team</button>
        <button id="createTournamentBtn" class="btn-submit">Create Tournament</button>
    </section>

    <!-- ACTION BUTTONS -->
    <div style="text-align:right; margin:10px;">
        <button id="resetDataBtn">RESET</button>
        <button id="undoLastBtn">UNDO</button>
    </div>

    <div class="groups-wrapper">

        <!-- GROUP A -->
        <section class="group-section card">
            <h2 class="group-title">Group A</h2>

            <form id="matchFormA" data-group="A" class="match-input">
                <select id="winningTeamA"></select>
                <select id="losingTeamA"></select>
                <input type="number" id="lostRoundsA" min="0" max="7">
                <button type="submit">Submit</button>
            </form>

            <table id="pointTableA">
                <thead>
                    <tr>
                        <th>Team</th><th>P</th><th>W</th><th>L</th><th>RP</th><th>Pts</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <!-- GROUP B -->
        <section class="group-section card">
            <h2 class="group-title">Group B</h2>

            <form id="matchFormB" data-group="B" class="match-input">
                <select id="winningTeamB"></select>
                <select id="losingTeamB"></select>
                <input type="number" id="lostRoundsB" min="0" max="7">
                <button type="submit">Submit</button>
            </form>

            <table id="pointTableB">
                <thead>
                    <tr>
                        <th>Team</th><th>P</th><th>W</th><th>L</th><th>RP</th><th>Pts</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

    </div>

</main>

<script src="script.js"></script>
</body>
</html>
